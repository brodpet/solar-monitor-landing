<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Solar Monitor</title>
<meta name="description" content="Live solar battery telemetry.">
<link rel="manifest" href="/app/manifest.json">
<link rel="icon" href="/app/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/app/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1017">
<style>
  :root {
    --bg: #0b1017; --surface: #141d28; --raised: #182331; --border: #2a3948;
    --border-strong: #3c5266; --text: #eaf2f8; --dim: #8fa3b5; --faint: #607385;
    --good: #b8f34a; --warn: #ffb84d; --bad: #ff6874; --accent: #56b4ff;
    --accent-soft: #12324c; --ink: #0b1017;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    padding: calc(env(safe-area-inset-top) + 20px) 16px 40px;
    max-width: 560px; margin: 0 auto;
  }
  .num { font-variant-numeric: tabular-nums; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .eyebrow { color: var(--accent); font-size: 10px; font-weight: 800; letter-spacing: 1.4px; margin-bottom: 3px; }
  h1 { font-size: 22px; letter-spacing: -0.4px; }
  .iconbtn { padding: 8px 12px; border: 1px solid var(--border); border-radius: 9px; background: none; color: var(--accent); font-size: 12px; font-weight: 700; cursor: pointer; }
  .connrow { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 4px; background: var(--warn); flex: none; }
  .connmeta { color: var(--dim); font-size: 11px; }
  .hero { display: flex; justify-content: space-between; align-items: center; background: var(--raised); border: 1px solid var(--border-strong); border-radius: 18px; padding: 18px; margin-bottom: 22px; }
  .herolabel { color: var(--dim); font-size: 10px; font-weight: 800; letter-spacing: 1.2px; }
  .heroval { font-size: 48px; font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; margin-top: 3px; }
  .herosub { color: var(--dim); font-size: 12px; }
  .powerline { display: flex; align-items: baseline; gap: 6px; margin-top: 16px; }
  .powerval { color: var(--good); font-size: 15px; font-weight: 800; }
  .powerlabel { color: var(--dim); font-size: 10px; }
  .estimate { font-size: 12px; font-weight: 700; margin-top: 6px; }
  .gauge { font-size: 44px; margin-left: 12px; }
  .sechead { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .sechead h2 { font-size: 17px; }
  .secmeta { color: var(--dim); font-size: 11px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .cardhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .namerow { display: flex; align-items: center; gap: 8px; }
  .pill { font-size: 17px; font-weight: 800; }
  .waiting { color: var(--dim); font-size: 11px; }
  .stale { color: var(--warn); font-size: 11px; margin: -6px 0 10px; }
  .socbar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; margin-bottom: 16px; }
  .socfill { height: 100%; border-radius: 4px; transition: width 0.6s; }
  .stats { display: flex; }
  .stat { flex: 1; }
  .statval { font-size: 16px; font-weight: 700; }
  .statlabel { color: var(--dim); font-size: 10px; margin-top: 3px; }
  .details { display: flex; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
  .detail { flex: 1; }
  .detlabel { color: var(--dim); font-size: 10px; }
  .detval { font-size: 12px; margin-top: 3px; }
  .cellsbtn { display: flex; justify-content: center; align-items: center; gap: 7px; width: 100%; margin-top: 16px; padding: 9px; border: 1px solid var(--accent); border-radius: 9px; background: none; color: var(--accent); font-size: 12px; font-weight: 700; cursor: pointer; }
  .cellgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
  .cell { background: var(--raised); border: 1px solid var(--border); border-radius: 8px; padding: 7px 4px; text-align: center; }
  .cell.hi { background: #23350f; border-color: var(--good); }
  .cell.hi .cellv { color: var(--good); font-weight: 700; }
  .cell.lo { background: #3a161c; border-color: var(--bad); }
  .cell.lo .cellv { color: var(--bad); font-weight: 700; }
  .cellidx { color: var(--faint); font-size: 9px; }
  .cellv { font-size: 11px; margin-top: 2px; }
  .empty { display: flex; align-items: center; gap: 8px; color: var(--dim); font-size: 12px; padding: 8px 0; }
  .pulse { width: 8px; height: 8px; border-radius: 4px; background: var(--faint); animation: pulse 1.6s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }
  .discover { border: 1px dashed var(--border-strong); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
  .discover h3 { font-size: 13px; color: var(--accent); margin-bottom: 4px; }
  .discover p { color: var(--dim); font-size: 12px; margin-bottom: 4px; }
  .discrow { display: flex; justify-content: space-between; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 12px; margin-top: 8px; }
  .discmac { font-size: 12px; }
  .discsoc { color: var(--dim); font-size: 11px; margin-top: 3px; }
  .addbtn { padding: 8px 16px; background: var(--accent); color: var(--ink); border: none; border-radius: 9px; font-size: 12px; font-weight: 800; cursor: pointer; }
  .removebtn { background: none; border: none; color: var(--bad); font-size: 12px; font-weight: 700; cursor: pointer; }
  .footer { color: var(--faint); font-size: 10px; text-align: center; margin-top: 16px; }
  .hint { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 12px; padding: 12px 14px; color: var(--dim); font-size: 12px; line-height: 1.6; margin-bottom: 14px; }
  .hint b { color: var(--text); }
</style>
</head>
<body>
  <div class="topbar">
    <div>
      <div class="eyebrow">LIVE TELEMETRY</div>
      <h1>Solar Monitor</h1>
    </div>
    <button class="iconbtn" id="editBtn">Edit packs</button>
  </div>
  <div class="connrow">
    <div class="dot" id="connDot"></div>
    <span id="connText">Connecting to broker</span>
    <span class="connmeta" id="connMeta"></span>
  </div>
  <div id="content"></div>
  <div class="footer">Read-only monitor · MQTT over WebSocket</div>

<script>
// surface any script failure visibly instead of a silently dead page
window.__errors = [];
window.onerror = function (msg, src, line) {
  window.__errors.push(msg + ' @ ' + (src || '?') + ':' + line);
  var box = document.getElementById('errbox');
  if (!box) {
    box = document.createElement('div');
    box.id = 'errbox';
    box.style.cssText = 'background:#3a1a1f;border:1px solid #ff6874;color:#ffd7da;border-radius:12px;padding:12px 14px;font-size:12px;line-height:1.5;margin-bottom:14px;word-break:break-word;';
    var content = document.getElementById('content');
    if (content && content.parentNode) content.parentNode.insertBefore(box, content);
    else document.body.appendChild(box);
  }
  box.textContent = 'Errors: ' + window.__errors.join(' || ') + ' — Browser: ' + navigator.userAgent;
};
window.__mqttLoadFailed = false;
</script>
<script src="/app/mqtt-4.min.js" onerror="window.__mqttLoadFailed = true; window.onerror('mqtt-4.min.js FAILED TO LOAD (network or blocked)', 'loader', 0)"></script>
<script>
if (!window.__mqttLoadFailed && typeof mqtt === 'undefined') {
  window.onerror('mqtt-4.min.js loaded but did not define mqtt (parse failure — engine too old?)', 'loader', 0);
}
</script>
<script>
'use strict';
// /app/<n> (preferred; survives Add to Home Screen) or ?g=<n> selects the gateway dashboard:
// 1 (or nothing) = main, 2 = second gateway, … Numbers map to prefixes jkbms, jkbms2, jkbms3…
const PATH_G = (location.pathname.match(/^\/app\/([a-z0-9_-]+)\/?$/) || [])[1];
const RAW_G = (PATH_G || new URLSearchParams(location.search).get('g') || '1').toLowerCase().replace(/[^a-z0-9_-]/g, '') || '1';
const IS_NUM = /^[0-9]+$/.test(RAW_G);
const GROUP = IS_NUM ? (RAW_G === '1' ? 'jkbms' : 'jkbms' + RAW_G) : RAW_G;
const BROKER = {
  url: 'wss://f5506f1eb31c415b88d7ba6707b7fafe.s1.eu.hivemq.cloud:8884/mqtt',
  username: 'jkbms',
  password: 'jkbmsapp',
  topicPrefix: GROUP,
};
if (GROUP !== 'jkbms') {
  // The manifest pins start_url to /app/ which would strip ?g= when installed to the
  // home screen. Removing it makes the browser bookmark the exact current URL instead,
  // so each numbered dashboard installs as its own app pointing at its own gateway.
  var manifestLink = document.querySelector('link[rel="manifest"]');
  if (manifestLink) manifestLink.parentNode.removeChild(manifestLink);
  document.title = 'Solar Monitor ' + (IS_NUM ? RAW_G : RAW_G.toUpperCase());
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelector('.eyebrow').textContent = 'LIVE TELEMETRY · ' + (IS_NUM ? 'GATEWAY ' + RAW_G : RAW_G.toUpperCase());
  });
}
const STALE_MS = 60000;
const FLOOR_SOC = 20;
const colors = { good: '#b8f34a', warn: '#ffb84d', bad: '#ff6874', faint: '#607385' };

// ---- state ----
const readings = {}; // mac -> reading
let gatewayLastSeen = null;
let connStatus = 'connecting';
let editMode = false;
const closedCells = new Set(); // cells are open by default; this tracks packs the user collapsed
let selected = []; // [{mac, name}]
let ignored = []; // macs the user removed — never auto-add these again
// per-group storage so each dashboard keeps its own selection (default group keeps legacy keys)
const KEY = GROUP === 'jkbms' ? 'solarmon' : 'solarmon.' + GROUP;
try { selected = JSON.parse(localStorage.getItem(KEY + '.packs') || '[]'); } catch {}
try { ignored = JSON.parse(localStorage.getItem(KEY + '.ignored') || '[]'); } catch {}
const savePacks = () => {
  localStorage.setItem(KEY + '.packs', JSON.stringify(selected));
  localStorage.setItem(KEY + '.ignored', JSON.stringify(ignored));
};

// ---- logic (ported from the Android app) ----
const num = (v) => (typeof v === 'number' && Number.isFinite(v) ? v : 0);
function parsePackPayload(raw, now) {
  let d;
  try { d = JSON.parse(raw); } catch { return null; }
  if (!d || typeof d !== 'object') return null;
  const mac = typeof d.mac === 'string' ? d.mac.trim().toLowerCase() : '';
  if (!mac) return null;
  return {
    mac, soc: num(d.soc), voltage: num(d.voltage), current: num(d.current), power: num(d.power),
    temp1: num(d.temp1), temp2: num(d.temp2), capacity: num(d.capacity),
    deltaCell: num(d.delta_cell), cells: Array.isArray(d.cells) ? d.cells.filter((c) => typeof c === 'number') : [],
    receivedAt: now,
  };
}
const isStale = (r, now) => now - r.receivedAt > STALE_MS;
const socColor = (pct, stale) => (stale ? colors.warn : pct > 50 ? colors.good : pct > 20 ? colors.warn : colors.bad);

function estimateRuntime(soc, capacityRemaining, current) {
  if (soc <= 0 || capacityRemaining <= 0) return null;
  const fullCapacity = capacityRemaining / (soc / 100);
  if (current >= 0.1) {
    if (soc >= 100) return null;
    return { kind: 'toFull', hours: (fullCapacity - capacityRemaining) / current };
  }
  if (current <= -0.1) {
    if (soc <= FLOOR_SOC) return null;
    const ah = capacityRemaining - fullCapacity * (FLOOR_SOC / 100);
    if (ah <= 0) return null;
    return { kind: 'toFloor', hours: ah / -current };
  }
  return null;
}
function estimateSystemRuntime(packs) {
  const valid = packs.filter((p) => p.soc > 0 && p.capacity > 0);
  if (!valid.length) return null;
  const remaining = valid.reduce((s, p) => s + p.capacity, 0);
  const full = valid.reduce((s, p) => s + p.capacity / (p.soc / 100), 0);
  const net = valid.reduce((s, p) => s + p.current, 0);
  return estimateRuntime((remaining / full) * 100, remaining, net);
}
function formatHours(h) {
  if (h < 1) return Math.max(1, Math.round(h * 60)) + ' min';
  if (h < 48) {
    const hh = Math.floor(h), m = Math.round((h - hh) * 60);
    return m > 0 ? hh + 'h ' + m + 'm' : hh + 'h';
  }
  return (h / 24).toFixed(1) + ' days';
}

// ---- mqtt ----
const client = mqtt.connect(BROKER.url, {
  username: BROKER.username, password: BROKER.password,
  reconnectPeriod: 5000, connectTimeout: 10000,
});
client.on('connect', () => { connStatus = 'connected'; client.subscribe(BROKER.topicPrefix + '/#'); render(); });
client.on('error', () => { connStatus = 'error'; render(); });
client.on('close', () => { if (connStatus !== 'error') connStatus = 'connecting'; render(); });
client.on('message', (topic, payload) => {
  const now = Date.now();
  if (topic.indexOf(BROKER.topicPrefix + '/gateway') === 0) { gatewayLastSeen = now; render(); return; }
  const r = parsePackPayload(payload.toString(), now);
  if (!r) return;
  // the gateway publishes each pack under jkbms/<pack name> — use it as display name
  r.topicName = topic.slice(BROKER.topicPrefix.length + 1) || r.mac;
  readings[r.mac] = r;
  // auto-add reporting packs so a freshly set-up gateway shows its packs with no extra taps
  if (!selected.some((p) => p.mac === r.mac) && ignored.indexOf(r.mac) < 0) {
    selected.push({ mac: r.mac, name: r.topicName });
    savePacks();
  }
  render();
});
setInterval(render, 5000); // staleness ticks

// ---- rendering (DOM building only — payload strings are untrusted, always set via textContent) ----
function el(tag, className, children, attrs) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (children != null) {
    for (const child of [].concat(children)) {
      if (child == null) continue;
      node.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
    }
  }
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === 'style') Object.assign(node.style, v);
    else if (k.startsWith('data-')) node.setAttribute(k, v);
    else node[k] = v;
  }
  return node;
}

function render() {
  const now = Date.now();
  const gatewayOnline = gatewayLastSeen !== null && now - gatewayLastSeen < 60000;
  document.getElementById('connDot').style.background =
    connStatus === 'error' ? colors.bad : connStatus === 'connected' && gatewayOnline ? colors.good : colors.warn;
  document.getElementById('connText').textContent =
    connStatus === 'connected' ? (gatewayOnline ? 'Gateway online' : 'Broker connected') :
    connStatus === 'error' ? 'Connection needs attention' : 'Connecting to broker';
  document.getElementById('connMeta').textContent = connStatus === 'connected' ? (gatewayOnline ? 'Live now' : 'No heartbeat recently') : '';
  document.getElementById('editBtn').textContent = editMode ? 'Done' : 'Edit packs';

  const sel = selected.map((p) => ({ ...p, reading: readings[p.mac] }));
  const live = sel.filter((p) => p.reading).map((p) => p.reading);
  const fresh = live.filter((r) => !isStale(r, now));
  const avgSoc = live.length ? live.reduce((s, r) => s + r.soc, 0) / live.length : null;
  const totalPower = live.reduce((s, r) => s + r.power, 0);
  const est = estimateSystemRuntime(fresh);
  const discovered = Object.values(readings).filter((r) => !selected.some((p) => p.mac === r.mac));

  const parts = [];
  if (selected.length) {
    const heroCopy = el('div', null, [
      el('div', 'herolabel', 'TOTAL SYSTEM'),
      el('div', 'heroval num', avgSoc === null ? '—' : Math.round(avgSoc) + '%'),
      el('div', 'herosub', live.length + ' of ' + selected.length + ' packs online'),
      el('div', 'powerline', [
        el('span', 'powerval num', (totalPower >= 0 ? '+' : '') + totalPower.toFixed(0) + ' W'),
        el('span', 'powerlabel', 'combined power'),
      ]),
      est && el('div', 'estimate num', '≈ ' + formatHours(est.hours) + (est.kind === 'toFull' ? ' to full charge' : ' to low battery (' + FLOOR_SOC + '%)'),
        { style: { color: est.kind === 'toFull' ? colors.good : colors.warn } }),
    ]);
    parts.push(el('div', 'hero', [heroCopy, el('div', 'gauge', '🔋')]));
    parts.push(el('div', 'sechead', [el('h2', null, 'Battery packs'), el('span', 'secmeta', selected.length + ' selected')]));
    for (const p of sel) parts.push(packCard(p, now));
  } else {
    const hint = el('div', 'hint');
    hint.append(el('b', null, 'Welcome! '), 'Battery packs publishing to your solar broker appear here automatically once a gateway is set up and online — no extra steps needed.');
    parts.push(hint);
  }
  if ((editMode || !selected.length) && discovered.length) {
    const disc = el('div', 'discover', [
      el('h3', null, 'Hidden packs reporting on the broker'),
      el('p', null, 'Tap Add to put a pack back on your dashboard.'),
    ]);
    for (const r of discovered) {
      disc.appendChild(el('div', 'discrow', [
        el('div', null, [
          el('div', 'discmac num', r.topicName || r.mac),
          el('div', 'discsoc num', r.mac + ' · SOC ' + r.soc + '% · ' + r.voltage.toFixed(1) + ' V'),
        ]),
        el('button', 'addbtn', 'Add', { 'data-add': r.mac }),
      ]));
    }
    parts.push(disc);
  }
  const content = document.getElementById('content');
  while (content.firstChild) content.removeChild(content.firstChild);
  for (const part of parts) content.appendChild(part);
}

function packCard(p, now) {
  const r = p.reading;
  const stale = r ? isStale(r, now) : false;
  const head = el('div', 'cardhead', [
    el('div', 'namerow', [
      el('div', 'dot', null, { style: { background: r ? socColor(r.soc, stale) : colors.faint } }),
      el('b', null, p.name),
    ]),
    editMode
      ? el('button', 'removebtn', 'Remove', { 'data-remove': p.mac })
      : r
        ? el('span', 'pill num', r.soc + '%', { style: { color: socColor(r.soc, stale) } })
        : el('span', 'waiting', 'Waiting for data'),
  ]);
  const card = el('div', 'card', [head]);
  if (!r) {
    card.appendChild(el('div', 'empty', [el('div', 'pulse'), 'Listening for this pack on MQTT']));
    return card;
  }
  if (stale) card.appendChild(el('div', 'stale', 'No update in the last 60 seconds'));
  card.appendChild(el('div', 'socbar', el('div', 'socfill', null, {
    style: { width: Math.min(100, Math.max(0, r.soc)) + '%', background: socColor(r.soc, stale) },
  })));
  const stat = (value, label) => el('div', 'stat', [el('div', 'statval num', value), el('div', 'statlabel', label)]);
  card.appendChild(el('div', 'stats', [
    stat(r.voltage.toFixed(2) + ' V', 'Voltage'),
    stat((r.current >= 0 ? '+' : '') + r.current.toFixed(1) + ' A', 'Current'),
    stat(r.power.toFixed(0) + ' W', 'Power'),
  ]));
  const detail = (label, value) => el('div', 'detail', [el('div', 'detlabel', label), el('div', 'detval num', value)]);
  card.appendChild(el('div', 'details', [
    detail('Cell spread', (r.deltaCell * 1000).toFixed(0) + ' mV'),
    detail('Capacity', r.capacity.toFixed(1) + ' Ah'),
    detail('Temps', r.temp1.toFixed(0) + '° / ' + r.temp2.toFixed(0) + '° C'),
  ]));
  // the gateway always sends 16 slots; unpopulated ones read 0 — show only real cells
  // (4 = 12V pack, 8 = 24V, 16 = 48V)
  const cells = r.cells.filter((c) => c > 1);
  if (cells.length) {
    const open = !closedCells.has(p.mac);
    card.appendChild(el('button', 'cellsbtn', open ? 'Hide cell voltages ⌃' : 'Show ' + cells.length + ' cell voltages ⌄', { 'data-cells': p.mac }));
    if (open) {
      const grid = el('div', 'cellgrid');
      const hi = Math.max.apply(null, cells);
      const lo = Math.min.apply(null, cells);
      const spread = hi > lo; // perfectly balanced pack: no highlight
      cells.forEach((c, i) => grid.appendChild(el('div', 'cell' + (spread && c === hi ? ' hi' : spread && c === lo ? ' lo' : ''), [
        el('div', 'cellidx', 'C' + (i + 1)),
        el('div', 'cellv num', c.toFixed(3)),
      ])));
      card.appendChild(grid);
    }
  }
  return card;
}

document.getElementById('editBtn').addEventListener('click', () => { editMode = !editMode; render(); });
document.getElementById('content').addEventListener('click', (e) => {
  const t = e.target;
  const add = t.getAttribute && t.getAttribute('data-add');
  const remove = t.getAttribute && t.getAttribute('data-remove');
  const cells = t.getAttribute && t.getAttribute('data-cells');
  if (add) {
    const auto = (readings[add] && readings[add].topicName) || 'Pack ' + (selected.length + 1);
    const name = prompt('Name this pack', auto);
    if (name === null) return;
    ignored = ignored.filter((m) => m !== add);
    selected.push({ mac: add, name: name.trim() || auto });
    savePacks(); render();
  } else if (remove) {
    selected = selected.filter((p) => p.mac !== remove);
    if (ignored.indexOf(remove) < 0) ignored.push(remove);
    savePacks(); render();
  } else if (cells) {
    closedCells.has(cells) ? closedCells.delete(cells) : closedCells.add(cells);
    render();
  }
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/app/sw.js');
render();
</script>
</body>
</html>
